# Production compose for deployed-stuff VM
# Uses the VM's existing PostgreSQL 17 (no DB container needed)
# Uses host networking so the container can reach 127.0.0.1:5432
# Backend exposed on port 8001 (port 8000 is taken by erp-rag)

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    network_mode: host
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    restart: unless-stopped
